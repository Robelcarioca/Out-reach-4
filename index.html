<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{
  background:#080c10;color:#dde4ee;
  font-family:'Outfit',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#1e2d3d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a3f55}
input,select,textarea,button{font-family:'Outfit',system-ui,sans-serif}
code,pre,.mono{font-family:'IBM Plex Mono',monospace}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ripple{0%{transform:scale(0.8);opacity:1}100%{transform:scale(2.4);opacity:0}}
@keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastSlide{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(0,200,130,0.3)}50%{box-shadow:0 0 20px rgba(0,200,130,0.7)}}
@keyframes countUp{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}

.fade-up{animation:fadeUp 0.3s ease forwards}
.fade-in{animation:fadeIn 0.2s ease forwards}
.slide-right{animation:slideRight 0.25s ease forwards}

/* Scanline overlay effect */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;z-index:9999;
}

.nav-item{transition:all 0.15s ease;cursor:pointer}
.nav-item:hover{background:rgba(0,200,130,0.06)!important}
.nav-item.active{background:rgba(0,200,130,0.1)!important}

.btn{transition:all 0.15s ease;cursor:pointer;border:none;font-family:'Outfit',sans-serif;font-weight:600}
.btn:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-primary{background:#00c882;color:#000;border-radius:8px;padding:10px 22px;font-size:13px}
.btn-ghost{background:transparent;color:#7a8fa6;border:1px solid #1e2d3d;border-radius:8px;padding:10px 18px;font-size:13px}
.btn-danger{background:transparent;color:#ff4d4d;border:1px solid rgba(255,77,77,0.3);border-radius:8px;padding:8px 14px;font-size:12px}
.btn-icon{background:transparent;color:#7a8fa6;border:1px solid #1e2d3d;border-radius:6px;padding:6px 10px;font-size:13px}

.card{background:#0d1520;border:1px solid #1a2535;border-radius:12px}
.input-field{
  background:#0a1118;border:1px solid #1e2d3d;border-radius:8px;
  padding:10px 14px;color:#dde4ee;font-size:13px;outline:none;width:100%;
  transition:border-color 0.15s,box-shadow 0.15s;font-family:'Outfit',sans-serif;
}
.input-field:focus{border-color:#00c882;box-shadow:0 0 0 3px rgba(0,200,130,0.1)}
.input-field::placeholder{color:#3a4f63}

.table-row{transition:background 0.1s ease}
.table-row:hover{background:rgba(0,200,130,0.03)!important}

.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-live{background:#00c882;animation:pulse 2s ease infinite}

/* Stat card hover */
.stat-card{transition:transform 0.15s,border-color 0.15s}
.stat-card:hover{transform:translateY(-2px);border-color:#2a3f55}

/* Reply notification pulse ring */
.pulse-ring{position:relative}
.pulse-ring::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid #00c882;animation:ripple 1.5s ease infinite;
}

/* Scrollable content */
.scroll-area{overflow-y:auto;overflow-x:hidden}

/* Tag chips */
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.03em}

/* Tooltip */
.tooltip{position:relative}
.tooltip:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:#1a2535;color:#dde4ee;padding:5px 10px;
  border-radius:6px;font-size:11px;white-space:nowrap;z-index:100;
  border:1px solid #2a3f55;pointer-events:none;
}

/* Progress bar */
.progress-bar{height:4px;background:#1a2535;border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:2px;transition:width 0.4s ease}

/* Live indicator */
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(0,200,130,0.1);border:1px solid rgba(0,200,130,0.3);
  color:#00c882;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
  font-family:'IBM Plex Mono',monospace;

/* Setup wizard */
.setup-step{background:#0d1520;border:1px solid #1a2535;border-radius:12px;padding:24px;margin-bottom:14px}
.setup-step.complete{border-color:rgba(0,200,130,0.3)}

.ai-dots span{
  display:inline-block;width:5px;height:5px;background:#00c882;border-radius:50%;margin:0 2px;
  animation:pulse 1.2s ease infinite;
}
.ai-dots span:nth-child(2){animation-delay:0.2s}
.ai-dots span:nth-child(3){animation-delay:0.4s}

// ─── GEMINI AI SERVICE ────────────────────────────────────
const AIService = {
  async _call(prompt, cfg, maxTokens=600) {
    const model = cfg.geminiModel || 'gemini-2.5-flash';
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;
    const resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-goog-api-key': cfg.geminiKey,
      },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: prompt }] }],
        generationConfig: { maxOutputTokens: maxTokens, temperature: 0.85 },
      }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(()=>({}));
      const msg = err?.error?.message || `Gemini error ${resp.status}`;
      throw new Error(msg);
    }
    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Gemini returned empty response');
    return text.trim();
  },

  async generateEmail(lead, cfg) {
    const { portfolioUrl, yourName, yourTitle } = cfg;
    const prompt = `You are ${yourName || 'Robel Gudissa'}, a web design consultant writing a cold outreach email to a potential client.

Business: ${lead.business_name}
Industry: ${lead.industry}
Location: ${lead.city}, ${lead.country}
Website: ${lead.website_url}
Specific problem found: ${lead.website_problem} — ${lead.problem_detail}
Your portfolio: ${portfolioUrl || 'https://yourportfolio.com'}

Write a SHORT, highly personalized cold outreach email. Rules:
- 3-4 paragraphs max
- First line must reference their SPECIFIC business and problem immediately (no generic openers)
- Mention the exact website issue with a concrete consequence (lost customers, trust issues, etc.)
- Include ONE sentence about your portfolio: "You can see examples of my work at ${portfolioUrl || 'https://yourportfolio.com'}"
- End with a simple call-to-action: ask for a 15-minute call
- Tone: professional but warm, like a helpful expert not a salesperson
- NO subject line, just the body
- Sign off as: ${yourName || 'Robel Gudissa'}, ${yourTitle || 'Web Design Consultant'}

Output ONLY the email body text. No subject line, no metadata.`;
    return this._call(prompt, cfg, 600);
  },

  async generateSubject(lead, cfg) {
    const prompt = `Write a single compelling cold email subject line for this business:
Business: ${lead.business_name} (${lead.industry} in ${lead.city}, ${lead.country})
Website issue: ${lead.website_problem}

Rules: Max 60 chars. No clickbait. Professional. Reference their business or specific issue.
Output ONLY the subject line, nothing else.`;
    const result = await this._call(prompt, cfg, 80);
    return result.replace(/^["']|["']$/g, '').split('\n')[0].trim();
  },
};

// ─── EMAILJS SERVICE ───────────────────────────────────────
const EmailService = {
  init(publicKey) {
    if (window.emailjs && publicKey) {
      window.emailjs.init({ publicKey });
      return true;
    }
    return false;
  },

  async send(lead, emailBody, subject, cfg) {
    return window.emailjs.send(cfg.serviceId, cfg.templateId, {
      to_email:        lead.contact_email,
      to_name:         lead.business_name,
      from_name:       cfg.yourName || SENDER_NAME,
      reply_to:        SENDER_EMAIL,
      subject,
      email_body:      emailBody,
      portfolio_url:   cfg.portfolioUrl || '',
      website_url:     lead.website_url,
      website_problem: lead.website_problem,
      industry:        lead.industry,
      city:            lead.city,
      country:         lead.country,
      unsubscribe_note:'You received this because your email is publicly listed as a business contact.',
    });

// ─── GMAIL API SERVICE ─────────────────────────────────────
const GmailService = {
  _token: null,
  _tokenClient: null,

  init(clientId, callback) {
    if (!window.google?.accounts?.oauth2) return false;
    this._tokenClient = window.google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: 'https://www.googleapis.com/auth/gmail.readonly',
      callback: (resp) => {
        if (resp.error) { callback(null, resp.error); return; }
        this._token = resp.access_token;
        callback(resp.access_token, null);
      },
    });
    return true;
  },

  requestToken() {
    if (this._tokenClient) this._tokenClient.requestAccessToken({ prompt: '' });
  },

  async fetchReplies(sentLeads) {
    if (!this._token) return [];
    // Search for messages sent TO our address (replies) in last 30 days
    const after = Math.floor((Date.now() - 30*24*60*60*1000)/1000);
    const q = encodeURIComponent(`to:${SENDER_EMAIL} after:${after}`);
    const url = `https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${q}&maxResults=50`;
    const resp = await fetch(url, {
      headers: { Authorization: `Bearer ${this._token}` }
    });
    if (!resp.ok) {
      if (resp.status === 401) this._token = null; // token expired
      return [];
    }
    const data = await resp.json();
    if (!data.messages?.length) return [];

    // Fetch details for each message
    const details = await Promise.allSettled(
      data.messages.slice(0, 20).map(m =>
        fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`, {
          headers: { Authorization: `Bearer ${this._token}` }
        }).then(r => r.json())
      )
    );

    const replies = [];
    for (const d of details) {
      if (d.status !== 'fulfilled') continue;
      const msg = d.value;
      const headers = msg.payload?.headers || [];
      const from    = headers.find(h => h.name === 'From')?.value || '';
      const subject = headers.find(h => h.name === 'Subject')?.value || '';
      const date    = headers.find(h => h.name === 'Date')?.value || '';

      // Try to match to a sent lead
      const emailMatch = from.match(/[\w._%+\-]+@[\w.\-]+\.[a-z]{2,}/i);
      const senderEmail = emailMatch ? emailMatch[0].toLowerCase() : '';

      const matchedLead = sentLeads.find(l =>
        l.contact_email?.toLowerCase() === senderEmail
      );

      replies.push({
        id:          msg.id,
        from,
        senderEmail,
        subject,
        date,
        snippet:     msg.snippet || '',
        leadId:      matchedLead?.id || null,
        leadName:    matchedLead?.business_name || null,
      });
    }
    return replies;
  },
};

    if (!('Notification' in window)) return false;
    const perm = await Notification.requestPermission();
    return perm === 'granted';

  show(title, body, icon = '📧') {
    if (Notification.permission !== 'granted') return;

  },
};

            <div style={{fontWeight:700,fontSize:13}}>

              <div style={{fontSize:11,color:COLORS.muted,display:'flex',alignItems:'center',gap:5,marginTop:2}}>

                <span className="ai-dots"><span/><span/><span/></span>

        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,

      </div>

  }, [leads]);

  const recentActivity = useMemo(() => {
    const sent = leads.filter(l=>l.status!=='new' && l.lastSentAt)
      .sort((a,b)=>new Date(b.lastSentAt)-new Date(a.lastSentAt))
      .slice(0,5)
      .map(l=>({type:'sent',name:l.business_name,time:l.lastSentAt,industry:l.industry,
        city:l.city,status:l.status}));
    const rep = replies.slice(0,5)
      .map(r=>({type:'reply',name:r.leadName||r.senderEmail,time:r.date,
        snippet:r.snippet}));
    return [...sent,...rep].sort((a,b)=>new Date(b.time||0)-new Date(a.time||0)).slice(0,8);
  }, [leads, replies]);

  const openRate = sentCount > 0 ? Math.round((counts.opened||0)/sentCount*100) : 0;
  const replyRate = sentCount > 0 ? Math.round(replies.length/sentCount*100) : 0;

          <div className="live-badge">
            <span className="status-dot status-live"/>

          <span style={{fontSize:11,color:COLORS.muted}}>
            Updated {new Date().toLocaleTimeString()}

      {/* KPI Row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        <StatCard label="Total Leads"    value={leads.length}         icon="👥" color={COLORS.blue}   sub={`${counts.new||0} new`}         delay={0}/>
        <StatCard label="Emails Sent"    value={sentCount}            icon="📤" color={COLORS.text}   sub="all campaigns"                  delay={60}/>

const ComposeTab = ({leads, cfg, onSendAll, bulkState}) => {
  const [testLead, setTestLead] = useState(null);
  const [testBody, setTestBody] = useState('');
  const [testSubj, setTestSubj] = useState('');
  const [generating, setGenerating] = useState(false);
  const [previewModal, setPreviewModal] = useState(false);
  const [sendingPreview, setSendingPreview] = useState(false);

  const newLeads = leads.filter(l=>l.status==='new' && l.contact_email);
  const hasSettings = cfg.geminiKey && cfg.emailjsServiceId && cfg.emailjsPublicKey && cfg.emailjsTemplateId;

  const handleGenerate = async () => {
    if (!testLead || !cfg.geminiKey) return;
    setGenerating(true);
    try {
      const [body, subj] = await Promise.all([
        AIService.generateEmail(testLead, cfg),
        AIService.generateSubject(testLead, cfg),
      ]);
      setTestBody(body);
      setTestSubj(subj);
    } catch(e) {
      alert('AI generation failed: ' + e.message);
    }
    setGenerating(false);
  };

  const handleSendPreview = async () => {
    if (!testLead || !testBody) return;
    setSendingPreview(true);
    EmailService.init(cfg.emailjsPublicKey);
    try {
      await EmailService.send(testLead, testBody, testSubj, cfg);
      setPreviewModal(false);
      setTestBody(''); setTestSubj('');
    } catch(e) {
      alert('Send failed: ' + e.message);
    }
    setSendingPreview(false);
  };

  return (
    <div className="fade-up" style={{maxWidth:720}}>
      {previewModal && testBody && (
        <EmailPreviewModal
          lead={testLead} subject={testSubj} body={testBody}
          onClose={()=>setPreviewModal(false)}
          onSend={handleSendPreview} sending={sendingPreview}/>
      )}

      <h1 style={{margin:'0 0 4px',fontSize:22,fontWeight:900,letterSpacing:'-0.03em'}}>Compose & Send</h1>
      <p style={{color:COLORS.muted,fontSize:13,marginBottom:24}}>AI writes a unique email for each business</p>

      {!hasSettings && (
        <div style={{background:'rgba(255,182,39,0.08)',border:'1px solid rgba(255,182,39,0.25)',
          borderRadius:10,padding:'14px 18px',marginBottom:20,fontSize:13,color:COLORS.yellow,fontWeight:600}}>
          ⚠️ Complete Settings first — you need Gemini API key + EmailJS credentials
        </div>
      )}

      {/* Bulk Send Card */}
      <div className="card" style={{padding:24,marginBottom:16,
        border:`1px solid ${COLORS.accent}33`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
          <div>
            <div style={{fontWeight:800,fontSize:16,marginBottom:4}}>🚀 Bulk AI Campaign</div>
            <div style={{color:COLORS.muted,fontSize:13}}>
              AI writes a personalized email for each lead, then sends automatically
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:28,fontWeight:900,color:COLORS.accent,
              fontFamily:"'IBM Plex Mono',monospace"}}>{newLeads.length}</div>
            <div style={{fontSize:11,color:COLORS.muted}}>new leads ready</div>
          </div>
        </div>

        {/* What AI does */}
        <div style={{background:COLORS.card,borderRadius:9,padding:'14px 16px',marginBottom:18,fontSize:12}}>
          <div style={{fontWeight:700,color:COLORS.purple,marginBottom:8}}>✨ What Claude does per email:</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,color:COLORS.muted}}>
            {[
              '→ References their exact business name',
              '→ Calls out their specific website problem',
              '→ Explains the business impact',
              '→ Links to your portfolio naturally',
              '→ Unique tone per industry',
              '→ Ends with clear CTA (15-min call)',
            ].map((t,i)=><span key={i}>{t}</span>)}
          </div>
        </div>

        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <button onClick={onSendAll} disabled={!hasSettings||bulkState.running||newLeads.length===0}
            className="btn btn-primary" style={{
              padding:'12px 28px',fontSize:14,display:'flex',alignItems:'center',gap:10,
              background:(!hasSettings||bulkState.running||newLeads.length===0)?COLORS.dim:COLORS.accent,
            }}>
            {bulkState.running
              ? <><Spinner size={14} color="#000"/> Sending {bulkState.done}/{bulkState.total}…</>
              : `🚀 Start Campaign → ${newLeads.length} emails`}
          </button>
          {bulkState.running && (
            <div style={{fontSize:12,color:COLORS.muted}}>
              {bulkState.aiGenerating ? (
                <span style={{color:COLORS.purple,display:'flex',alignItems:'center',gap:6}}>
                  <span className="ai-dots"><span/><span/><span/></span> AI writing…
                </span>
              ) : '✦ Sending…'}
            </div>
          )}
        </div>
      </div>

      {/* Single Email Test */}
      <div className="card" style={{padding:24}}>
        <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>🧪 Test: Generate & Preview Single Email</div>
        <div style={{color:COLORS.muted,fontSize:13,marginBottom:18}}>
          Pick a lead, generate the AI email, review it, then send
        </div>
        <Field label="Select Lead">
          <select value={testLead?.id||''} onChange={e=>{
            const l = leads.find(x=>x.id==e.target.value);
            setTestLead(l||null); setTestBody(''); setTestSubj('');
          }} className="input-field" style={{background:COLORS.card,border:`1px solid ${COLORS.border2}`}}>
            <option value="">— pick a lead —</option>
            {leads.filter(l=>l.contact_email).map(l=>(
              <option key={l.id} value={l.id}>
                {l.business_name} ({l.contact_email})
              </option>
            ))}
          </select>
        </Field>
        {testBody && (
          <div style={{marginTop:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <div style={{fontWeight:700,fontSize:12,color:COLORS.accent}}>✦ AI-Generated Email</div>
              <span style={{fontSize:11,color:COLORS.muted}}>Subject: {testSubj}</span>
            </div>
            <div style={{background:COLORS.card,borderRadius:8,padding:'14px 16px',
              fontSize:12,color:COLORS.muted,lineHeight:1.8,whiteSpace:'pre-wrap',
              border:`1px solid ${COLORS.border}`,maxHeight:240,overflowY:'auto'}}>
              {testBody}
            </div>
          </div>
        )}
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button onClick={handleGenerate} disabled={!testLead||!cfg.geminiKey||generating}
            className="btn" style={{
              background:COLORS.purple,color:'#fff',borderRadius:8,padding:'10px 20px',
              fontSize:13,fontWeight:700,border:'none',
              display:'flex',alignItems:'center',gap:8,
              opacity:(!testLead||!cfg.geminiKey)?0.4:1,
            }}>
            {generating ? <><Spinner size={12} color="#fff"/> Generating…</> : '✨ Generate Email'}
          </button>
          {testBody && (
            <button onClick={()=>setPreviewModal(true)} className="btn btn-primary"
              style={{display:'flex',alignItems:'center',gap:8}}>
              👁 Preview & Send
            </button>
          )}
        </div>
      </div>
    </div>
  );
};


// ─── MAIN APP ─────────────────────────────────────────────
function OutreachOS() {
  const [tab, setTab]     = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [toastKey, setToastKey] = useState(0);
  const flash = useCallback((msg, type='ok') => {
    setToast({msg,type}); setToastKey(k=>k+1);
  }, []);

  // Settings (persisted)
  const [cfg, setCfg] = useState(()=> LS.get('outreachos_cfg', {
    yourName: 'Robel Gudissa', yourTitle: 'Web Design Consultant',
    yourCompany: 'Robel Web Studio', portfolioUrl: '',
    geminiKey: '', geminiModel: 'gemini-2.5-flash', emailjsServiceId: '', emailjsTemplateId: '',
    emailjsPublicKey: '', sendDelay: '8',
    googleClientId: '',
  }));

  const saveCfg = useCallback((newCfg) => {
    setCfg(newCfg);
    LS.set('outreachos_cfg', newCfg);
    flash('Settings saved ✓');
  }, [flash]);

  // Leads (persisted)
  const [leads, setLeads] = useState(()=> {
    const saved = LS.get('outreachos_leads', null);
    return saved || INITIAL_LEADS;
  });
  const persistLeads = (updated) => { setLeads(updated); LS.set('outreachos_leads', updated); };

  const addLead    = (l) => { const updated=[...leads,l]; persistLeads(updated); flash('Lead added ✓'); };
  const editLead   = (l) => { const updated=leads.map(x=>x.id===l.id?l:x); persistLeads(updated); flash('Lead updated ✓'); };
  const deleteLead = (id) => { const updated=leads.filter(l=>l.id!==id); persistLeads(updated); flash('Lead removed','warn'); };

  // Replies (persisted)
  const [replies, setReplies] = useState(()=> LS.get('outreachos_replies', []));
  const persistReplies = (r) => { setReplies(r); LS.set('outreachos_replies', r); };

  // Stats
  const sentCount = useMemo(()=> leads.filter(l=>l.status!=='new'&&l.status!=='skipped').length, [leads]);

  // Gmail
  const [gmailConnected, setGmailConnected] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const pollTimer = useRef(null);

  const fetchReplies = useCallback(async (showToast=false) => {
    if (!gmailConnected) return;
    setRefreshing(true);
    try {
      const sentLeads = leads.filter(l=>l.status!=='new');
      const found = await GmailService.fetchReplies(sentLeads);
      if (found.length > 0) {
        // Merge with existing, deduplicate by id
        const existing = LS.get('outreachos_replies', []);
        const existingIds = new Set(existing.map(r=>r.id));
        const newOnes = found.filter(r=>!existingIds.has(r.id));
        if (newOnes.length > 0) {
          const merged = [...newOnes, ...existing];
          persistReplies(merged);
          // Mark matched leads as replied
          const matchedIds = new Set(newOnes.map(r=>r.leadId).filter(Boolean));
          if (matchedIds.size > 0) {
            const updated = leads.map(l=>
              matchedIds.has(l.id) ? {...l, status:'replied'} : l
            );
            persistLeads(updated);
          }
          // Notify
          newOnes.forEach(r => {
            NotifService.show(
              `Reply from ${r.leadName||r.senderEmail}`,
              r.snippet || r.subject || 'New reply',
              '💬'
            );
          });
          if (showToast) flash(`${newOnes.length} new reply${newOnes.length>1?'ies':''}! 💬`, 'ok');
        } else {
          if (showToast) flash('No new replies found', 'info');
        }
      } else {
        if (showToast) flash('No replies found', 'info');
      }
    } catch(e) {
      if (showToast) flash('Gmail check failed: ' + e.message, 'err');
    }
    setRefreshing(false);
  }, [gmailConnected, leads, flash]);

  // Start polling when Gmail connected
  useEffect(() => {
    if (!gmailConnected) { clearInterval(pollTimer.current); return; }
    fetchReplies();
    pollTimer.current = setInterval(()=> fetchReplies(), POLL_INTERVAL_MS);
    return ()=> clearInterval(pollTimer.current);
  }, [gmailConnected]);

  const connectGmail = useCallback((clientId) => {
    if (!clientId) { flash('Enter Google OAuth Client ID first', 'warn'); return; }
    const ok = GmailService.init(clientId, (token, err) => {
      if (err) { flash('Gmail auth failed: '+err, 'err'); return; }
      setGmailConnected(true);
      flash('Gmail connected! Checking for replies…', 'ok');
      NotifService.requestPermission();
    });
    if (!ok) {
      flash('Google Identity Services not loaded. Check your internet connection.', 'err');
      return;
    }
    GmailService.requestToken();
  }, [flash]);

  // ─── BULK SEND ─────────────────────────────────────────
  const [bulkState, setBulkState] = useState({
    running:false, done:0, total:0, current:'', aiGenerating:false, errors:[], active:false,
  });
  const stopRef = useRef(false);

  const runBulkSend = useCallback(async () => {
    const { geminiKey, emailjsPublicKey, emailjsServiceId, emailjsTemplateId } = cfg;
    if (!geminiKey||!emailjsPublicKey||!emailjsServiceId||!emailjsTemplateId) {
      flash('Complete Settings before sending', 'err'); setTab('settings'); return;
    }
    EmailService.init(emailjsPublicKey);
    const targets = leads.filter(l=>l.contact_email && l.status==='new');
    if (!targets.length) { flash('No new leads with email addresses', 'warn'); return; }

    stopRef.current = false;
    setBulkState({running:true,done:0,total:targets.length,current:'',aiGenerating:false,errors:[],active:true});

    let done=0; const errors=[];

    for (const lead of targets) {
      if (stopRef.current) break;

      setBulkState(s=>({...s,current:lead.business_name,aiGenerating:true}));

      // Step 1: AI generate
      let emailBody='', subject='';
      try {
        [emailBody, subject] = await Promise.all([
          AIService.generateEmail(lead, cfg),
          AIService.generateSubject(lead, cfg),
        ]);
      } catch(e) {
        errors.push(lead.business_name+': AI failed - '+e.message);
        setBulkState(s=>({...s,aiGenerating:false,errors:[...s.errors,lead.business_name]}));
        continue;
      }

      setBulkState(s=>({...s,aiGenerating:false}));

      // Step 2: Send email
      try {
        await EmailService.send(lead, emailBody, subject, cfg);
        done++;
        const now = new Date().toISOString();
        const updated = leads.map(l=>
          l.id===lead.id ? {...l, status:'contacted', lastSentAt:now, lastSubject:subject} : l
        );
        persistLeads(updated);
        setBulkState(s=>({...s,done}));
      } catch(e) {
        errors.push(lead.business_name+': Send failed - '+e.message);
        setBulkState(s=>({...s,errors:[...s.errors,lead.business_name]}));
      }

      // Delay between sends
      const delay = parseInt(cfg.sendDelay||'8')*1000;
      await new Promise(r=>setTimeout(r, delay));
    }

    setBulkState(s=>({...s,running:false,done,errors}));
    flash(`Campaign done! ${done} emails sent${errors.length?' ('+errors.length+' failed)':''}`, errors.length?'warn':'ok');
  }, [cfg, leads, flash]);

  // ─── SINGLE SEND ──────────────────────────────────────
  const [singleModal, setSingleModal] = useState(null);
  const [singleBody, setSingleBody]   = useState('');
  const [singleSubj, setSingleSubj]   = useState('');
  const [singleSending, setSingleSending] = useState(false);
  const [singleGenerating, setSingleGenerating] = useState(false);

  const sendOne = useCallback(async (lead) => {
    if (!cfg.geminiKey) { flash('Add Gemini API key in Settings', 'warn'); setTab('settings'); return; }
    setSingleModal(lead); setSingleBody(''); setSingleSubj(''); setSingleGenerating(true);
    try {
      const [body, subj] = await Promise.all([
        AIService.generateEmail(lead, cfg),
        AIService.generateSubject(lead, cfg),
      ]);
      setSingleBody(body); setSingleSubj(subj);
    } catch(e) {
      flash('AI generation failed: ' + e.message, 'err');
      setSingleModal(null);
    }
    setSingleGenerating(false);
  }, [cfg, flash]);

  const handleSingleSend = useCallback(async () => {
    if (!singleModal||!singleBody) return;
    setSingleSending(true);
    EmailService.init(cfg.emailjsPublicKey);
    try {
      await EmailService.send(singleModal, singleBody, singleSubj, cfg);
      const now = new Date().toISOString();
      const updated = leads.map(l=>
        l.id===singleModal.id ? {...l,status:'contacted',lastSentAt:now,lastSubject:singleSubj} : l
      );
      persistLeads(updated);
      flash(`Email sent to ${singleModal.contact_email} ✓`);
      setSingleModal(null); setSingleBody(''); setSingleSubj('');
    } catch(e) {
      flash('Send failed: '+e.message, 'err');
    }
    setSingleSending(false);
  }, [singleModal, singleBody, singleSubj, cfg, leads, flash]);

  // ─── NAV ──────────────────────────────────────────────
  const NAV = [
    {id:'dashboard',icon:'◈', label:'Dashboard'},
    {id:'leads',    icon:'◉', label:'Leads',    badge:leads.length},
    {id:'compose',  icon:'✦', label:'Compose'},
    {id:'replies',  icon:'💬',label:'Replies',  badge:replies.length||null, accent:replies.length>0},
    {id:'settings', icon:'◌', label:'Settings'},
  ];

  // ─── RENDER ────────────────────────────────────────────
  return (
    <div style={{display:'flex',height:'100vh',background:COLORS.bg,color:COLORS.text,overflow:'hidden'}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>

      {/* Toast */}
      {toast && <Toast key={toastKey} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}

      {/* Single email generating overlay */}
      {singleGenerating && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',
          display:'flex',alignItems:'center',justifyContent:'center',zIndex:700,
          backdropFilter:'blur(10px)'}}>
          <div className="card" style={{padding:'32px 40px',textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:16}}>✨</div>
            <div style={{fontWeight:800,fontSize:16,marginBottom:8}}>Claude is writing your email</div>
            <div style={{color:COLORS.muted,fontSize:13,marginBottom:16}}>
              Personalizing for {singleModal?.business_name}...
            </div>
            <div className="ai-dots" style={{justifyContent:'center',display:'flex'}}>
              <span/><span/><span/>
            </div>
          </div>
        </div>
      )}

      {/* Email preview modal */}
      {singleModal && singleBody && !singleGenerating && (
        <EmailPreviewModal
          lead={singleModal} subject={singleSubj} body={singleBody}
          onClose={()=>{setSingleModal(null);setSingleBody('');setSingleSubj('');}}
          onSend={handleSingleSend} sending={singleSending}/>
      )}

      {/* Progress banner */}
      <ProgressBanner
        state={bulkState}
        onStop={()=>{stopRef.current=true; flash('Stopping…','warn');}}
        onClose={()=>setBulkState(s=>({...s,active:false,total:0,done:0}))}/>

      {/* Sidebar */}
      <div style={{
        width:220, background:COLORS.surface, borderRight:`1px solid ${COLORS.border}`,
        display:'flex', flexDirection:'column', flexShrink:0,
      }}>
        {/* Logo */}
        <div style={{padding:'20px 18px 16px',borderBottom:`1px solid ${COLORS.border}`}}>
          <div style={{fontSize:17,fontWeight:900,letterSpacing:'-0.03em',
            background:'linear-gradient(135deg, #00c882, #3b9eff)',
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
            fontFamily:"'IBM Plex Mono',monospace"}}>
            ⚡ OutreachOS
          </div>
          <div style={{fontSize:10,color:COLORS.muted,marginTop:3,
            textTransform:'uppercase',letterSpacing:'0.1em'}}>
            AI Outreach Platform
          </div>
        </div>

        {/* Sender info */}
        <div style={{padding:'12px 18px',borderBottom:`1px solid ${COLORS.border}`,
          background:COLORS.card,fontSize:11}}>
          <div style={{color:COLORS.muted,marginBottom:3,fontWeight:700,
            textTransform:'uppercase',letterSpacing:'0.06em',fontSize:9}}>Sending As</div>
          <div style={{color:COLORS.accent,fontFamily:"'IBM Plex Mono',monospace",fontSize:10,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {SENDER_EMAIL}
          </div>
        </div>

        {/* Nav */}
        <nav style={{padding:'10px 8px',flex:1}}>
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item${tab===n.id?' active':''}`}
              onClick={()=>setTab(n.id)}
              style={{
                display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                borderRadius:8,marginBottom:2,
                background:tab===n.id?'rgba(0,200,130,0.1)':'transparent',
                color:tab===n.id?COLORS.accent:COLORS.muted,
                fontWeight:tab===n.id?700:400,fontSize:13,
              }}>
              <span style={{fontSize:14,flexShrink:0}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {n.badge && (
                <span style={{
                  background:n.accent?COLORS.accent:tab===n.id?COLORS.accent:COLORS.border,
                  color:n.accent?'#000':tab===n.id?'#000':COLORS.muted,
                  borderRadius:10,padding:'1px 8px',fontSize:10,fontWeight:800,
                  fontFamily:"'IBM Plex Mono',monospace",
                }}>{n.badge}</span>
              )}
            </div>
          ))}
        </nav>

        {/* Gmail status */}
        <div style={{padding:'12px 16px',borderTop:`1px solid ${COLORS.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:7,fontSize:11}}>
            <span className="status-dot" style={{
              background:gmailConnected?COLORS.accent:COLORS.dim,
              animation:gmailConnected?'pulse 2s ease infinite':'none',
            }}/>
            <span style={{color:gmailConnected?COLORS.accent:COLORS.muted,fontWeight:600}}>
              {gmailConnected?'Gmail Live':'Gmail Off'}
            </span>
          </div>
        </div>

        {/* User */}
        <div style={{padding:'14px 16px',borderTop:`1px solid ${COLORS.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:'50%',
              background:'linear-gradient(135deg,#00c882,#3b9eff)',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:13,fontWeight:900,color:'#000',flexShrink:0,
              fontFamily:"'IBM Plex Mono',monospace"}}>RG</div>
            <div>
              <div style={{color:COLORS.text,fontWeight:700,fontSize:12}}>
                {cfg.yourName||'Robel Gudissa'}
              </div>
              <div style={{color:COLORS.muted,fontSize:10}}>{cfg.yourTitle||'Web Consultant'}</div>
            </div>
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="scroll-area" style={{flex:1,padding:'28px 32px'}}>
        {tab==='dashboard' && (
          <DashboardTab leads={leads} replies={replies} sentCount={sentCount}/>
        )}
        {tab==='leads' && (
          <LeadsTab
            leads={leads} replies={replies}
            onAdd={addLead} onEdit={editLead} onDelete={deleteLead}
            onSendOne={sendOne} bulkState={bulkState} onSendAll={runBulkSend}/>
        )}
        {tab==='compose' && (
          <ComposeTab leads={leads} cfg={cfg} onSendAll={runBulkSend} bulkState={bulkState}/>
        )}
        {tab==='replies' && (
          <RepliesTab
            replies={replies} leads={leads}
            gmailConnected={gmailConnected}
            onRefresh={()=>fetchReplies(true)} refreshing={refreshing}/>
        )}
        {tab==='settings' && (
          <SettingsTab
            cfg={cfg} onChange={setCfg} onSave={saveCfg}
            onGmailConnect={connectGmail} gmailConnected={gmailConnected}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OutreachOS/>);
</script>
</body>
</html>
